# Base configuration for the early project stage.
# Keep this file small and only cover values that current scripts need.

dataset:
  # Project-relative paths are supported and will be resolved automatically.
  root: data
  raw_dir: raw
  processed_dir: processed
  splits_dir: splits
  train_source_dir: train/image
  test_source_dir: test
  train_split: train.txt
  gallery_split: gallery.txt
  query_split: query.txt

preprocess:
  resize:
    enabled: true
    width: 256
    height: 256
  color_mode: gray

local_feature:
  method: sift
  save: true
  max_samples: 3
  orb_nfeatures: 500

visualization:
  enabled: true
  save_keypoints: true

encoding:
  enabled: false
  input:
    feature_dir: outputs/features
    encoded_dir: outputs/encoded
  codebook:
    enabled: false
    output_dir: outputs/indices/codebooks
    trainer: minibatch_kmeans
    n_clusters: 256
    max_descriptors: 50000
    batch_size: 1024
    random_state: 42
  bow:
    enabled: true
    normalized: false

output:
  feature_dir: outputs/features
  index_dir: outputs/indices
  figure_dir: outputs/figures
  log_dir: outputs/logs
